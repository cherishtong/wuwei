# Release — Full matrix build on tag push, publish to GitHub Release
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.0.1-beta)'
        required: true

env:
  GRAALVM_VERSION: '25.0.2'
  VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}

jobs:
  # ═══════════════════════════════════════════════════════════════
  # 0. Extract version string
  # ═══════════════════════════════════════════════════════════════
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.ver.outputs.semver }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - id: ver
        run: |
          TAG='${{ env.VERSION }}'
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "semver=$(echo "$TAG" | sed 's/^v//')" >> $GITHUB_OUTPUT

  # ═══════════════════════════════════════════════════════════════
  # 1. Shared artifacts
  # ═══════════════════════════════════════════════════════════════

  frontend:
    name: Frontend (SPA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: wuwei-renderer/package-lock.json
      - working-directory: wuwei-renderer
        run: npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: wuwei-renderer/dist/
          retention-days: 7

  jar:
    name: Fat JAR (Cloud)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: '9.3.1' }
      - working-directory: wuwei-core
        run: gradle fatJar --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: wuwei-kernel-jar
          path: wuwei-core/build/libs/wuwei-kernel.jar
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  # 2. Platform desktop builds (native image + Tauri)
  # ═══════════════════════════════════════════════════════════════

  # ── Linux: native + Tauri (deb, appimage) ──
  desktop-linux:
    name: Desktop Linux
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libappindicator3-dev librsvg2-dev patchelf \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Set up GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Manual GraalVM install (fallback)
        if: failure()
        run: |
          URL="https://download.oracle.com/graalvm/25/archive/graalvm-jdk-${{ env.GRAALVM_VERSION }}_linux-x64_bin.tar.gz"
          curl -fSL "$URL" -o /tmp/graalvm.tar.gz
          sudo mkdir -p /usr/lib/jvm/graalvm
          sudo tar -xzf /tmp/graalvm.tar.gz -C /usr/lib/jvm/graalvm --strip-components=1
          echo "JAVA_HOME=/usr/lib/jvm/graalvm" >> $GITHUB_ENV
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH

      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: '9.3.1' }

      - name: Build native kernel
        working-directory: wuwei-core
        run: gradle nativeCompile --no-daemon -PnativeImageXmx=6g

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64
          path: wuwei-core/build/native/nativeCompile/wuwei-kernel
          retention-days: 7

      # Tauri
      - name: Copy kernel for Tauri bundle
        run: |
          mkdir -p wuwei-renderer/src-tauri/binaries
          cp wuwei-core/build/native/nativeCompile/wuwei-kernel wuwei-renderer/src-tauri/binaries/

      - uses: actions/download-artifact@v4
        with: { name: dist, path: wuwei-renderer/dist }

      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Install npm dependencies (for Tauri beforeBuildCommand)
        working-directory: wuwei-renderer
        run: npm ci
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"
      - name: Build Tauri (deb + appimage)
        working-directory: wuwei-renderer
        run: cargo tauri build --bundles deb,appimage

      - name: Upload Tauri packages
        uses: actions/upload-artifact@v4
        with:
          name: tauri-linux
          path: |
            wuwei-renderer/src-tauri/target/release/bundle/deb/*.deb
            wuwei-renderer/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 7
        continue-on-error: true

  # ── macOS: native + Tauri (dmg) ──
  desktop-macos:
    name: Desktop macOS
    runs-on: macos-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Manual GraalVM install (fallback)
        if: failure()
        run: |
          ARCH=$(uname -m); [ "$ARCH" = "arm64" ] && P="aarch64" || P="amd64"
          URL="https://download.oracle.com/graalvm/25/archive/graalvm-jdk-${{ env.GRAALVM_VERSION }}_macos-${P}_bin.tar.gz"
          curl -fSL "$URL" -o /tmp/graalvm.tar.gz
          sudo mkdir -p /Library/Java/JavaVirtualMachines/graalvm
          sudo tar -xzf /tmp/graalvm.tar.gz -C /Library/Java/JavaVirtualMachines/graalvm --strip-components=1
          echo "JAVA_HOME=/Library/Java/JavaVirtualMachines/graalvm/Contents/Home" >> $GITHUB_ENV
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH

      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: '9.3.1' }

      - name: Build native kernel
        working-directory: wuwei-core
        run: gradle nativeCompile --no-daemon -PnativeImageXmx=6g

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: native-macos-arm64
          path: wuwei-core/build/native/nativeCompile/wuwei-kernel
          retention-days: 7

      # Tauri
      - name: Copy kernel for Tauri bundle
        run: |
          mkdir -p wuwei-renderer/src-tauri/binaries
          cp wuwei-core/build/native/nativeCompile/wuwei-kernel wuwei-renderer/src-tauri/binaries/

      - uses: actions/download-artifact@v4
        with: { name: dist, path: wuwei-renderer/dist }

      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Install npm dependencies (for Tauri beforeBuildCommand)
        working-directory: wuwei-renderer
        run: npm ci
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"
      - name: Build Tauri (dmg)
        working-directory: wuwei-renderer
        run: cargo tauri build --bundles dmg

      - name: Upload Tauri DMG
        uses: actions/upload-artifact@v4
        with:
          name: tauri-macos
          path: wuwei-renderer/src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 7
        continue-on-error: true

  # ── Windows: native + Tauri (nsis) ──
  desktop-windows:
    name: Desktop Windows
    runs-on: windows-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Manual GraalVM install (fallback)
        if: failure()
        shell: pwsh
        run: |
          $url = "https://download.oracle.com/graalvm/25/archive/graalvm-jdk-${{ env.GRAALVM_VERSION }}_windows-x64_bin.zip"
          Invoke-WebRequest -Uri $url -OutFile $env:RUNNER_TEMP\graalvm.zip
          Expand-Archive $env:RUNNER_TEMP\graalvm.zip -DestinationPath $env:RUNNER_TEMP\graalvm
          $root = Get-ChildItem $env:RUNNER_TEMP\graalvm | Select-Object -First 1
          "JAVA_HOME=$($root.FullName)" >> $env:GITHUB_ENV
          "$($root.FullName)\bin" >> $env:GITHUB_PATH

      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: '9.3.1' }
      - uses: ilammy/msvc-dev-cmd@v1
        with: { arch: amd64 }

      - name: Build native kernel
        working-directory: wuwei-core
        run: gradle nativeCompile --no-daemon -PnativeImageXmx=6g

      # Tauri
      - name: Copy kernel for Tauri bundle
        shell: pwsh
        run: |
          mkdir -Force wuwei-renderer\src-tauri\binaries
          copy wuwei-core\build\native\nativeCompile\wuwei-kernel.exe wuwei-renderer\src-tauri\binaries\

      - uses: actions/download-artifact@v4
        with: { name: dist, path: wuwei-renderer/dist }

      # Install npm deps so Tauri's beforeBuildCommand can run
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Install npm dependencies
        working-directory: wuwei-renderer
        run: npm ci

      - name: Install Rust toolchain
        run: rustup update stable
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"
      - name: Build Tauri (nsis)
        working-directory: wuwei-renderer
        run: cargo tauri build --bundles nsis

      - name: Upload Tauri installer
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: wuwei-renderer/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  # 3. Package & GitHub Release
  # ═══════════════════════════════════════════════════════════════
  release:
    name: Package & Release
    needs: [version, jar, desktop-linux, desktop-macos, desktop-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: artifacts
          merge-multiple: false

      - name: Pack artifacts
        env:
          V: ${{ needs.version.outputs.semver }}
        run: |
          set -euo pipefail
          mkdir -p packages

          # ── Cloud deployment ──
          PKG="wuwei-cloud-${V}"
          mkdir -p "$PKG/dist"
          cp artifacts/wuwei-kernel-jar/wuwei-kernel.jar "$PKG/"
          cp -r artifacts/dist/* "$PKG/dist/"
          cat > "$PKG/wuwei.json" << JSONEOF
          { "version": "${V}", "llm": { "provider": "deepseek", "model": "deepseek-v4-pro", "apiKeyEnv": "WUWEI_API_KEY", "apiKey": "" }, "logLevel": "info" }
          JSONEOF
          cat > "$PKG/start.sh" << 'SHEOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          exec java -Xmx512m -jar "$SCRIPT_DIR/wuwei-kernel.jar" --profile cloud --web-root "$SCRIPT_DIR/dist" --config "$SCRIPT_DIR/wuwei.json"
          SHEOF
          chmod +x "$PKG/start.sh"
          cat > "$PKG/start.bat" << 'BATOF'
          @echo off
          java -Xmx512m -jar "%~dp0wuwei-kernel.jar" --profile cloud --web-root "%~dp0dist" --config "%~dp0wuwei.json"
          BATOF
          tar -czf "packages/wuwei-cloud-${V}.tar.gz" "$PKG"
          (cd "$PKG" && zip -r "../packages/wuwei-cloud-${V}.zip" .)
          echo "✓ Cloud packages"

          # ── Standalone native ──
          for plat in linux-x64 macos-arm64; do
            bin="artifacts/native-${plat}/wuwei-kernel"
            if [ -f "$bin" ]; then
              cp "$bin" "packages/wuwei-kernel-${plat}-${V}"
              chmod +x "packages/wuwei-kernel-${plat}-${V}"
              (cd packages && tar -czf "wuwei-desktop-${plat}-${V}.tar.gz" "wuwei-kernel-${plat}-${V}")
              echo "✓ Desktop $plat"
            fi
          done

          # ── Tauri ──
          for p in windows linux macos; do
            dir="artifacts/tauri-${p}"
            if [ -d "$dir" ]; then
              cp "$dir"/* packages/ 2>/dev/null || true
              echo "✓ Tauri ${p}"
            fi
          done
          ls -lh packages/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Wuwei ${{ needs.version.outputs.semver }}
          body: |
            ## Wuwei ${{ needs.version.outputs.semver }}

            ### 🚀 Cloud Deployment
            | File | For |
            |------|-----|
            | `wuwei-cloud-${{ needs.version.outputs.semver }}.tar.gz` | Linux |
            | `wuwei-cloud-${{ needs.version.outputs.semver }}.zip` | Windows |
            > Requires JDK 21. Run `start.sh` or `start.bat`.

            ### 🖥️ Desktop (Native)
            | File | For |
            |------|-----|
            | `wuwei-desktop-linux-x64-${{ needs.version.outputs.semver }}.tar.gz` | Linux x64 |
            | `wuwei-desktop-macos-arm64-${{ needs.version.outputs.semver }}.tar.gz` | macOS ARM |

            ### 🪟🐧🍎 Desktop (Tauri Installers)
            | File | For |
            |------|-----|
            | `Wuwei_*_x64-setup.exe` | Windows NSIS |
            | `wuwei-shell_*_amd64.deb` | Linux deb |
            | `wuwei-shell_*.AppImage` | Linux AppImage |
            | `Wuwei_*.dmg` | macOS DMG |
          draft: false
          prerelease: true
          files: packages/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
